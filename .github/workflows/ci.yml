name: SDK CI

on:
  push:
    paths:
      - "packages/sdk/**"
  pull_request:
    paths:
      - "packages/sdk/**"

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: packages/sdk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build package
        run: python -m build

      - name: Verify distributions
        run: twine check dist/*

      - name: Install wheel
        run: pip install dist/rag_debugger-*.whl

      - name: Verify import and version
        run: python -c "import rag_debugger; print(f'rag-debugger {rag_debugger.__version__}')"

      - name: Verify adapter import guards
        run: |
          python -c "
          try:
              from rag_debugger.adapters.langchain import RAGDebuggerCallback
              exit(1)
          except ImportError as e:
              assert 'langchain-core' in str(e)
              print('LangChain guard OK')
          "
          python -c "
          try:
              from rag_debugger.adapters.llamaindex import RAGDebuggerLlamaIndex
              exit(1)
          except ImportError as e:
              assert 'llama-index-core' in str(e)
              print('LlamaIndex guard OK')
          "
          python -c "
          try:
              from rag_debugger.adapters.openai import RAGDebuggerOpenAI
              exit(1)
          except ImportError as e:
              assert 'openai' in str(e)
              print('OpenAI guard OK')
          "
