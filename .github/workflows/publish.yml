name: Publish SDK to PyPI

on:
  push:
    tags:
      - "v*.*.*"           # auto-publish on version tags like v0.1.0

  workflow_dispatch:        # allow manual trigger from GitHub Actions UI
    inputs:
      dry_run:
        description: "Dry run (build only, skip upload)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      test_pypi:
        description: "Publish to TestPyPI instead of PyPI"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk
    permissions:
      id-token: write      # required for trusted publishing (OIDC)
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build dist and wheel
        run: python -m build

      - name: Verify distributions
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: packages/sdk/dist/

      - name: Verify package
        run: |
          pip install dist/rag_debugger-*.whl
          python -c "import rag_debugger; print(f'rag-debugger {rag_debugger.__version__}')"

      - name: Publish to TestPyPI
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.test_pypi == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/sdk/dist/
          repository-url: https://test.pypi.org/legacy/
          print-hash: true

      - name: Publish to PyPI
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.test_pypi != 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/sdk/dist/
          print-hash: true